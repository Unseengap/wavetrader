services:
  wavetrader:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-live
    restart: unless-stopped
    volumes:
      - ./data:/data:rw
      - ./checkpoints:/checkpoints:rw
    env_file:
      - .env
    environment:
      - CHECKPOINT_DIR=/data/checkpoints
      - CHECKPOINT_INTERVAL=100
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: wavetrader-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"

  dashboard:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-dashboard
    restart: unless-stopped
    ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - ./data:/data:ro
      - ./checkpoints:/checkpoints:ro
      - ./backtest_results:/backtest_results:ro
      - ./processed_data:/processed_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - OANDA_DEMO_API_KEY=${OANDA_DEMO_API_KEY}
      - OANDA_DEMO_ACCOUNT_ID=${OANDA_DEMO_ACCOUNT_ID}
      - OANDA_LIVE_API_KEY=${OANDA_LIVE_API_KEY:-}
      - OANDA_LIVE_ACCOUNT_ID=${OANDA_LIVE_ACCOUNT_ID:-}
    command: python -m dashboard.run --host 0.0.0.0 --port 5000
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis-data:
