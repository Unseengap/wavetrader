services:
  # ── Model A: WaveTrader MTF (existing) ──────────────────────────────────
  wavetrader-mtf:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-mtf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./data:/data:rw
      - ./checkpoints:/checkpoints:rw
    env_file:
      - .env
    environment:
      - CHECKPOINT_DIR=/data/checkpoints
      - CHECKPOINT_INTERVAL=100
      - MODEL_ID=mtf
      - OANDA_API_KEY=${OANDA_DEMO_API_KEY}
      - OANDA_ACCOUNT_ID=${MTF_OANDA_DEMO_ACCOUNT_ID:-${OANDA_DEMO_ACCOUNT_ID}}
      - OANDA_ENVIRONMENT=practice
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Model B: WaveFollower (trend-following) ──────────────────────────────
  # Uses OANDA account 101-001-30902818-002 (same user, separate account)
  wavetrader-wavefollower:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-wavefollower
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./data:/data:rw
      - ./checkpoints:/checkpoints:rw
    env_file:
      - .env
    environment:
      - CHECKPOINT_DIR=/data/checkpoints
      - CHECKPOINT_INTERVAL=100
      - MODEL_ID=wavefollower
      - OANDA_API_KEY=${WF_OANDA_DEMO_API_KEY}
      - OANDA_ACCOUNT_ID=${WF_OANDA_DEMO_ACCOUNT_ID}
      - OANDA_DEMO_API_KEY=${WF_OANDA_DEMO_API_KEY}
      - OANDA_DEMO_ACCOUNT_ID=${WF_OANDA_DEMO_ACCOUNT_ID}
      - OANDA_ENVIRONMENT=practice
      - CHECKPOINT_PATH=/checkpoints/wavefollower_20260412_023912/model_weights.pt
      - PAIR=GBP/JPY
      - MIN_CONFIDENCE=0.55
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Model C: MeanReversion (mean-reversion) ─────────────────────────────
  # Uses its own OANDA account (separate from MTF and WaveFollower)
  wavetrader-meanrev:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-meanrev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./data:/data:rw
      - ./checkpoints:/checkpoints:rw
    env_file:
      - .env
    environment:
      - CHECKPOINT_DIR=/data/checkpoints
      - CHECKPOINT_INTERVAL=100
      - MODEL_ID=meanrev
      - OANDA_API_KEY=${MR_OANDA_DEMO_API_KEY}
      - OANDA_ACCOUNT_ID=${MR_OANDA_DEMO_ACCOUNT_ID}
      - OANDA_DEMO_API_KEY=${MR_OANDA_DEMO_API_KEY}
      - OANDA_DEMO_ACCOUNT_ID=${MR_OANDA_DEMO_ACCOUNT_ID}
      - OANDA_ENVIRONMENT=practice
      - PAIR=GBP/JPY
      - MIN_CONFIDENCE=0.55
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: wavetrader-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"

  dashboard:
    build: .
    image: wavetrader:latest
    container_name: wavetrader-dashboard
    restart: unless-stopped
    ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - ./data:/data:ro
      - ./checkpoints:/checkpoints:ro
      - ./backtest_results:/backtest_results:ro
      - ./processed_data:/processed_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      # Model registry — JSON array of model definitions
      # For a single model, this can be omitted (falls back to default MTF)
      - MODEL_REGISTRY=${MODEL_REGISTRY:-}
      # Model A (MTF) — OANDA credentials
      - OANDA_DEMO_API_KEY=${OANDA_DEMO_API_KEY}
      - OANDA_DEMO_ACCOUNT_ID=${MTF_OANDA_DEMO_ACCOUNT_ID:-${OANDA_DEMO_ACCOUNT_ID}}
      - OANDA_LIVE_API_KEY=${OANDA_LIVE_API_KEY:-}
      - OANDA_LIVE_ACCOUNT_ID=${MTF_OANDA_LIVE_ACCOUNT_ID:-${OANDA_LIVE_ACCOUNT_ID:-}}
      # Model B (WaveFollower) — OANDA credentials
      - WF_OANDA_DEMO_API_KEY=${WF_OANDA_DEMO_API_KEY:-}
      - WF_OANDA_DEMO_ACCOUNT_ID=${WF_OANDA_DEMO_ACCOUNT_ID:-}
      # Model C (MeanReversion) — OANDA credentials
      - MR_OANDA_DEMO_API_KEY=${MR_OANDA_DEMO_API_KEY:-}
      - MR_OANDA_DEMO_ACCOUNT_ID=${MR_OANDA_DEMO_ACCOUNT_ID:-}
    command: python -m dashboard.run --host 0.0.0.0 --port 5000
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis-data:
